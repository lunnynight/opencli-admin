# III cron schedules for opencli sites (B站 / 小红书 / Twitter 等)
# Requires: agent-1 Chrome session logged in + collector-opencli worker running
# Cron: 6-field III iii-cron — second minute hour day month weekday

schedules:
  - id: bilibili-hot
    enabled: true
    site: bilibili
    command: hot
    args:
      limit: "20"
    expression: "0 0 */2 * * *"   # every 2 hours

  - id: xiaohongshu-search-ai
    enabled: false
    site: xiaohongshu
    command: search
    args:
      keyword: "AI"
      limit: "20"
    expression: "0 30 */4 * * *"  # every 4 hours at :30

  - id: twitter-timeline
    enabled: true
    site: twitter
    command: timeline
    args:
      limit: "20"
    expression: "0 */30 * * * *"  # every 30 minutes