name: ci

on:
  push:
    branches:
      - main
      - develop
      - codex/**
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    name: Frontend (Vite)
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-dist
          path: frontend/dist

  extension:
    runs-on: ubuntu-latest
    name: Browser Extension
    defaults:
      run:
        working-directory: chrome/extension-src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: chrome/extension-src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload extension dist
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: extension-dist
          path: chrome/extension-src/dist

  backend:
    runs-on: ubuntu-latest
    name: Backend Quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Backend syntax check
        run: python -m compileall backend

      - name: Unit tests
        run: pytest tests/unit -m "not live" --no-cov
